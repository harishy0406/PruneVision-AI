version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
# PruneVision AI - Docker Compose Configuration
# Multi-service setup for development and production deployment
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Streamlit Dashboard Application
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prunevision-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
      - ./prunevision:/app/prunevision
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_LOGGER_LEVEL=info
      - DEVICE=cpu
    restart: unless-stopped
    networks:
      - prunevision-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Model Server (Optional)
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: prunevision-api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs:ro
      - ./prunevision:/app/prunevision:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DEVICE=cpu
    restart: unless-stopped
    networks:
      - prunevision-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    profiles:
      - with-api

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database (For persistent results storage)
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: prunevision-db
    environment:
      - POSTGRES_DB=prunevision
      - POSTGRES_USER=prunevision_user
      - POSTGRES_PASSWORD=prunevision_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - prunevision-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prunevision_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-db

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Cache (For caching and session management)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: prunevision-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - prunevision-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-cache

  # ─────────────────────────────────────────────────────────────────────────
  # Prometheus Monitoring
  # ─────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prunevision-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - prunevision-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - with-monitoring

  # ─────────────────────────────────────────────────────────────────────────
  # Grafana Dashboarding
  # ─────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: prunevision-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - prunevision-network
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - with-monitoring

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: prunevision-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    networks:
      - prunevision-network
    depends_on:
      - app
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - with-proxy

# ═══════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════
networks:
  prunevision-network:
    driver: bridge
    name: prunevision-network
